name: Hourly Amazon Scraper

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

# Grant permission for the bot to push the JSON file back to the repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: |
        python scraper.py

    - name: Save price history back to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # Check if the file exists before trying to commit it
        if [ -f price_history.json ]; then
          git add price_history.json
          git commit -m "Automated hourly price history update" || echo "No changes to commit"
          git push
        else
          echo "price_history.json not found. The Python script failed before creating it."
        fi