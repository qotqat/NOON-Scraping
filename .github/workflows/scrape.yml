name: Hourly Noon Scraper

on:
  schedule:
    # Runs at minute 45 past every hour (e.g., 1:45, 2:45)
    - cron: '45 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-noon:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Noon Scraper
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: |
        python noon_scraper.py

    - name: Save Noon data back to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # Add the Noon specific files
        if [ -f noon_price_history.json ]; then
          git add noon_price_history.json
        fi
        if [ -f noon_price_drops.csv ]; then
          git add noon_price_drops.csv
        fi
        
        git commit -m "Automated Noon price check and CSV update" || echo "No changes to commit"
        git push