name: Hourly Noon Scraper

on:
  schedule:
    # Runs at minute 45 past every 4th hour (e.g., 00:45, 01:45, 02:45, 03:45, 04:45, 05:45)
    - cron: '45 */1 * * *'
  workflow_dispatch: # You can still click the button to run it manually anytime!

permissions:
  contents: write

jobs:
  scrape-noon:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Noon Scraper
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: |
        python noon_scraper.py

    - name: Save Noon data back to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # Adds all files containing 'noon' in the name
        git add *noon*.json *noon*.csv || echo "No files to add"
        
        git commit -m "Automated Multi-Category Noon Check" || echo "No changes to commit"
        
        # THE FIX: Pulls any recent changes from the repo to prevent conflicts
        git pull --rebase origin main
        
        git push
